# ── Flint .tmux.conf ─────────────────────────────────────────
# Practical defaults for occasional-to-moderate tmux use.
# No plugins required — everything here is built-in.

# ── Prefix ────────────────────────────────────────────────────
# Ctrl-a is easier to reach than the default Ctrl-b
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ───────────────────────────────────────────────────
set -g default-terminal "screen-256color"   # 256-color support
set -ga terminal-overrides ",xterm*:Tc"     # true color support
set -g history-limit 50000                  # generous scrollback
set -g mouse on                             # mouse support (scroll, resize, select)
set -g base-index 1                         # windows start at 1
setw -g pane-base-index 1                   # panes start at 1
set -g renumber-windows on                  # renumber when a window is closed
set -s escape-time 0                        # no delay after pressing Escape
set -g repeat-time 300                      # repeat timeout (ms)
set -g focus-events on                      # pass focus events to apps

# ── Splits ────────────────────────────────────────────────────
# Intuitive split keys: | for vertical, - for horizontal
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window inherits current path
bind c new-window -c "#{pane_current_path}"

# ── Pane navigation (vim-style) ──────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Ctrl + vim keys (repeatable)
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# ── Window navigation ────────────────────────────────────────
bind -r n next-window
bind -r p previous-window

# Quick window switching with Alt + number (no prefix needed)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# ── Copy mode (vi-style) ─────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode                        # Enter copy mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# ── Reload config ─────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ── Status bar ────────────────────────────────────────────────
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=colour235,fg=colour248"

# Left: session name
set -g status-left-length 30
set -g status-left "#[fg=colour232,bg=colour109,bold] #S #[default] "

# Right: date and time
set -g status-right-length 50
set -g status-right "#[fg=colour248] %a %b %d  %H:%M "

# Window tabs
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=colour232,bg=colour109,bold] #I:#W "
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour109"

# Messages
set -g message-style "bg=colour109,fg=colour232,bold"
